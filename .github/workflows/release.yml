name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    # windows-latest is needed for the net48 test pass against the netstandard2.0 build.
    runs-on: windows-latest

    permissions:
      contents: write   # required for creating GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # SourceLink wants full history.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF -replace '^refs/tags/v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing version $version"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Pack
        run: dotnet pack src/Fsst/Fsst.csproj --no-build --configuration Release -p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: pwsh
        run: |
          if (-not $env:NUGET_API_KEY) {
            Write-Error "NUGET_API_KEY secret is not configured."
            exit 1
          }
          dotnet nuget push "src/Fsst/bin/Release/Clast.Fsst.${{ steps.version.outputs.version }}.nupkg" --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            "src/Fsst/bin/Release/Clast.Fsst.${{ steps.version.outputs.version }}.nupkg" `
            "src/Fsst/bin/Release/Clast.Fsst.${{ steps.version.outputs.version }}.snupkg" `
            --generate-notes
