name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # windows-latest is required because the test project targets net48,
    # which exercises the netstandard2.0 build of the library.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # SourceLink embeds commit info; fetch the full history so it can resolve.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Pack
        run: dotnet pack src/Fsst/Fsst.csproj --no-build --configuration Release

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            src/Fsst/bin/Release/*.nupkg
            src/Fsst/bin/Release/*.snupkg
